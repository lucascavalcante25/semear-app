<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="1600" viewBox="0 0 1200 1600">
  <defs>
    <linearGradient id="header" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#5a7a3a"/>
      <stop offset="100%" stop-color="#46602d"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="1600" fill="#ffffff"/>
  <rect x="0" y="0" width="1200" height="220" fill="url(#header)"/>
  <text x="600" y="95" text-anchor="middle" fill="#ffffff" font-family="Arial, Helvetica, sans-serif" font-size="52" font-weight="700">ANDROID</text>
  <text x="600" y="155" text-anchor="middle" fill="#eef4e6" font-family="Arial, Helvetica, sans-serif" font-size="34" font-weight="600">Instalar com Google Chrome</text>

  <g font-family="Arial, Helvetica, sans-serif" fill="#1f2937">
    <g transform="translate(80,280)">
      <circle cx="42" cy="42" r="42" fill="#5a7a3a"/>
      <text x="42" y="54" text-anchor="middle" fill="#fff" font-size="40" font-weight="700">1</text>
      <text x="110" y="38" font-size="34" font-weight="700">Abra o link no Chrome</text>
      <text x="110" y="82" font-size="26" fill="#4b5563">Copie o link do app e abra no Google Chrome.</text>
      <rect x="110" y="110" width="920" height="150" rx="20" fill="#f3f4f6" stroke="#d1d5db"/>
      <circle cx="180" cy="185" r="36" fill="#4285F4"/>
      <circle cx="165" cy="175" r="10" fill="#EA4335"/>
      <circle cx="195" cy="175" r="10" fill="#FBBC05"/>
      <circle cx="180" cy="200" r="10" fill="#34A853"/>
      <text x="250" y="195" font-size="28" font-weight="600">Google Chrome</text>
    </g>

    <g transform="translate(80,560)">
      <circle cx="42" cy="42" r="42" fill="#5a7a3a"/>
      <text x="42" y="54" text-anchor="middle" fill="#fff" font-size="40" font-weight="700">2</text>
      <text x="110" y="38" font-size="34" font-weight="700">Toque no menu (3 pontinhos)</text>
      <text x="110" y="82" font-size="26" fill="#4b5563">Fica no canto superior direito da tela.</text>
      <rect x="650" y="20" width="380" height="220" rx="24" fill="#111827"/>
      <rect x="680" y="50" width="320" height="28" rx="14" fill="#374151"/>
      <text x="970" y="78" text-anchor="end" fill="#fff" font-size="42" font-weight="700">...</text>
      <text x="820" y="170" text-anchor="middle" fill="#9ca3af" font-size="22">Menu do Chrome</text>
    </g>

    <g transform="translate(80,860)">
      <circle cx="42" cy="42" r="42" fill="#5a7a3a"/>
      <text x="42" y="54" text-anchor="middle" fill="#fff" font-size="40" font-weight="700">3</text>
      <text x="110" y="38" font-size="34" font-weight="700">Instalar app</text>
      <text x="110" y="82" font-size="26" fill="#4b5563">Toque em Instalar app ou Adicionar a tela inicial.</text>
      <rect x="110" y="110" width="920" height="90" rx="16" fill="#ecfdf3" stroke="#86efac"/>
      <text x="140" y="165" font-size="30" font-weight="600" fill="#166534">Instalar app</text>
      <rect x="110" y="220" width="920" height="90" rx="16" fill="#f9fafb" stroke="#d1d5db"/>
      <text x="140" y="275" font-size="30" font-weight="600">Adicionar a tela inicial</text>
    </g>

    <g transform="translate(80,1180)">
      <circle cx="42" cy="42" r="42" fill="#5a7a3a"/>
      <text x="42" y="54" text-anchor="middle" fill="#fff" font-size="40" font-weight="700">4</text>
      <text x="110" y="38" font-size="34" font-weight="700">Pronto!</text>
      <text x="110" y="82" font-size="26" fill="#4b5563">Confirme. O icone do app aparecera na tela inicial.</text>
      <rect x="110" y="120" width="130" height="130" rx="28" fill="#5a7a3a"/>
      <text x="175" y="205" text-anchor="middle" fill="#fff" font-size="28" font-weight="700">App</text>
      <text x="270" y="195" font-size="28" fill="#4b5563">Toque no icone para abrir como aplicativo.</text>
    </g>
  </g>

  <text x="600" y="1540" text-anchor="middle" fill="#6b7280" font-family="Arial, Helvetica, sans-serif" font-size="26">Minha Igreja Digital</text>
</svg>
