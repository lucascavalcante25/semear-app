# ===================================================================
# Spring Boot configuration for the "dev" profile.
#
# This configuration overrides the application.yml file.
#
# More information on profiles: https://www.jhipster.tech/profiles/
# More information on configuration properties: https://www.jhipster.tech/common-application-properties/
# ===================================================================

# ===================================================================
# Standard Spring Boot properties.
# Full reference is available at:
# http://docs.spring.io/spring-boot/docs/current/reference/html/common-application-properties.html
# ===================================================================

logging:
  level:
    ROOT: INFO
    tech.jhipster: INFO
    br.com.semear: INFO
    org.hibernate.SQL: WARN
    jdk.internal.httpclient: WARN
    jdk.internal.httpclient.debug: OFF

spring:
  config:
    import: optional:file:../../../../../.env[.properties]
  devtools:
    restart:
      enabled: true
      additional-exclude: static/**
    livereload:
      enabled: false # we use Webpack dev server + BrowserSync for livereload
  jackson:
    serialization:
      indent-output: true
  datasource:
    type: com.zaxxer.hikari.HikariDataSource
    url: ${SEMEAR_DB_URL:jdbc:postgresql://localhost:5432/semearDB}
    username: ${SEMEAR_DB_USER:postgres}
    password: ${SEMEAR_DB_PASSWORD:postgres}
    hikari:
      poolName: Hikari
      auto-commit: false
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        format_sql: false
        javax:
          cache:
            missing_cache_strategy: create
  liquibase:
    enabled: true
    # Remove 'faker' if you do not want the sample data to be loaded automatically
    contexts: dev, faker
    # Evita falha por checksum em ambiente dev quando changelogs evoluem
    clear-checksums: true
  mail:
    host: ${SPRING_MAIL_HOST:smtp-relay.brevo.com}
    port: ${SPRING_MAIL_PORT:587}
    username: ${SPRING_MAIL_USERNAME:}
    password: ${SPRING_MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
  messages:
    cache-duration: PT1S # 1 second, see the ISO 8601 standard
  thymeleaf:
    cache: false

server:
  port: 8080
  compression:
    enabled: true
    mime-types: text/html,text/xml,text/plain,text/css,application/javascript,application/json,image/svg+xml
    min-response-size: 1024
  # make sure requests the proxy uri instead of the server one
  forward-headers-strategy: native

# ===================================================================
# JHipster specific properties
#
# Full reference is available at: https://www.jhipster.tech/common-application-properties/
# ===================================================================

jhipster:
  cache: # Cache configuration
    ehcache: # Ehcache configuration
      time-to-live-seconds: 3600 # By default objects stay 1 hour in the cache
      max-entries: 100 # Number of objects in each cache entry
  # CORS is only enabled by default with the "dev" profile
  cors:
    # Allow Ionic for JHipster by default (* no longer allowed in Spring Boot 2.4+)
    allowed-origins: 'http://localhost:8100,https://localhost:8100,http://localhost:5173,http://127.0.0.1:5173'
    # Enable CORS when running in GitHub Codespaces
    allowed-origin-patterns: 'https://*.githubpreview.dev,http://192.168.*.*:5173'
    allowed-methods: '*'
    allowed-headers: '*'
    exposed-headers: 'Authorization,Link,X-Total-Count,X-${jhipster.clientApp.name}-alert,X-${jhipster.clientApp.name}-error,X-${jhipster.clientApp.name}-params'
    allow-credentials: true
    max-age: 1800
  security:
    authentication:
      jwt:
        # This token must be encoded using Base64 and be at least 256 bits long (you can type `openssl rand -base64 64` on your command line to generate a 512 bits one)
        base64-secret: s8C+r2wM61EklhhqYFnjYJftbob0mGN4mGyZZm/vSQD7bh6KDzJEbuPOt0+jAVKZKYNXtXbJUk7Y2aFNP+gmAA==
        # Token is valid 24 hours
        token-validity-in-seconds: 86400
        token-validity-in-seconds-for-remember-me: 2592000
  mail: # specific JHipster mail property, for standard properties see MailProperties
    from: ${SEMEAR_MAIL_FROM:semear@localhost}
    base-url: ${SEMEAR_MAIL_BASE_URL:http://localhost:5173}
  logging:
    use-json-format: false # By default, logs are not in Json format
    logstash: # Forward logs to logstash over a socket, used by LoggingConfiguration
      enabled: false
      host: localhost
      port: 5000
      ring-buffer-size: 512
# ===================================================================
# Application specific properties
# Add your own application properties here, see the ApplicationProperties class
# to have type-safe configuration, like in the JHipsterProperties above
#
# More documentation is available at:
# https://www.jhipster.tech/common-application-properties/
# ===================================================================

# Diretório para upload de arquivos (cifras de louvores)
# Usa caminho absoluto para evitar problemas com diretório de trabalho do Undertow
semear:
  upload-dir: ${user.home}/semear-app/uploads
  sms:
    enabled: ${SEMEAR_SMS_ENABLED:false}
    sender: ${SEMEAR_SMS_SENDER:Semear}
  brevo:
    api-key: ${SEMEAR_BREVO_API_KEY:}
  push:
    enabled: ${SEMEAR_PUSH_ENABLED:false}
    firebase-project-id: ${SEMEAR_FIREBASE_PROJECT_ID:}
    firebase-service-account: ${SEMEAR_FIREBASE_SERVICE_ACCOUNT:}
    vapid-public-key: ${SEMEAR_FIREBASE_VAPID_PUBLIC_KEY:}
    teste-endpoint-enabled: ${SEMEAR_PUSH_TESTE_ENABLED:true}
  recuperacao-senha:
    email-habilitado: ${SEMEAR_RECUPERACAO_EMAIL_ENABLED:true}
  monitoramento:
    intervalo-coleta-ms: 300000
    historico-retencao-dias: 7
    alertas:
      habilitado: ${SEMEAR_MONITORAMENTO_ALERTAS_ENABLED:true}
      cooldown-minutos: 60
      email-destinos: ${SEMEAR_MONITORAMENTO_ALERTAS_EMAIL:}

# application:
application:
  liquibase:
    # Em dev, rode o Liquibase de forma síncrona para evitar corrida com seeders/CommandLineRunner
    async-start: false
